name: Fetch Flight Prices

on:
  schedule:
    - cron: '0 7 * * *'    # 09:00 Budapest (UTC+2)
    - cron: '0 12 * * *'   # 14:00 Budapest
    - cron: '0 17 * * *'   # 19:00 Budapest
    - cron: '0 22 * * *'   # 00:00 Budapest
    - cron: '0 3 * * *'    # 05:00 Budapest
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Kód checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 beállítása
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Függőségek telepítése
        run: pip install -r requirements.txt

      - name: Jegyárak lekérése
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python fetch_prices.py

      - name: Dashboard generálása
        run: python generate_dashboard.py

      - name: CSV és dashboard visszacommitálása
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: árak és dashboard frissítve – ${{ github.run_id }}"
          file_pattern: data/prices.csv docs/index.html docs/.nojekyll
